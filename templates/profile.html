{% extends 'base.html' %}

{% block title %}
Profile
{% endblock %}

{% block content %}
<div class="container py-5">

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card p-4">

<h3 class="mb-4">
Edit Profile
</h3>

<form method="POST">

<div class="mb-3">
<label>Username</label>

<input
type="text"
name="username"
class="form-control"
value="{{ current_user.username }}"
required>
</div>

<div class="mb-3">
<label>Email</label>

<input
type="email"
name="email"
class="form-control"
value="{{ current_user.email }}"
required>
</div>

<div class="mb-3">
<label>New Password</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Leave empty to keep current password">
</div>

<button
type="submit"
class="btn btn-gold w-100">

Save Changes

</button>

</form>

</div>
</div>
</div>
</div>
{% endblock %}
