{% extends 'base.html' %}
{% block title %}Register — LuxeStay{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="fa fa-user-plus fa-2x mb-3" style="color:var(--gold)"></i>
                    <h3 style="font-family:'Playfair Display',serif">Create Account</h3>
                    <p class="text-muted small">Join LuxeStay and enjoy exclusive benefits</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:var(--surface);border:1px solid rgba(201,169,110,0.2);border-right:none;color:var(--gold)">
                                <i class="fa fa-user"></i>
                            </span>
                            <input type="text" name="username" class="form-control" style="border-left:none" placeholder="johndoe" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:var(--surface);border:1px solid rgba(201,169,110,0.2);border-right:none;color:var(--gold)">
                                <i class="fa fa-envelope"></i>
                            </span>
                            <input type="email" name="email" class="form-control" style="border-left:none" placeholder="you@example.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:var(--surface);border:1px solid rgba(201,169,110,0.2);border-right:none;color:var(--gold)">
                                <i class="fa fa-lock"></i>
                            </span>
                            <input type="password" name="password" class="form-control" style="border-left:none" placeholder="Min. 6 characters" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-gold w-100 py-2">
                        <i class="fa fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
                <hr style="border-color:rgba(201,169,110,0.15);margin:1.5rem 0">
                <p class="text-center text-muted small">
                    Already have an account?
                    <a href="{{ url_for('auth.login') }}" style="color:var(--gold)">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
